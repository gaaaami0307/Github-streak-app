default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DB_HOST", "db") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "github_streak_app_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "github_streak_app_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "github_streak_app_production") %>
