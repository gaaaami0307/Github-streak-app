name: Provision PR preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  provision:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID || secrets.NEON_SERVICE_ID }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl dnsutils

      - name: Create Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          BRANCH_NAME="pr-${{ github.event.number }}-${GITHUB_SHA::8}"
          echo "Creating Neon branch: $BRANCH_NAME"
          resp=""

          # Diagnostic: check DNS resolution before the API call
          echo "DNS lookup for console.neon.tech:"
          nslookup console.neon.tech || true

          # curl with retries for transient network issues
          CURL_OPTS=(--retry 5 --retry-delay 2 --retry-connrefused --connect-timeout 10 --max-time 30 --fail-with-body)

          if ! resp=$(curl -sS "${CURL_OPTS[@]}" -X POST "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"$BRANCH_NAME\"},\"endpoints\":[{\"type\":\"read_write\"}]}"); then
            echo "Neon API request failed. Diagnostic follow-up:"
            nslookup console.neon.tech || true
            curl -v https://console.neon.tech/ || true
            echo "response: ${resp:-}"
            exit 1
          fi

          branch_id=$(echo "$resp" | jq -r '.branch.id // empty')
          db_name=$(echo "$resp" | jq -r '.databases[0].name // empty')
          role_name=$(echo "$resp" | jq -r '.roles[0].name // empty')
          if [ -z "$branch_id" ] || [ -z "$db_name" ] || [ -z "$role_name" ]; then
            echo "Failed to parse branch/database/role from response: $resp"
            exit 1
          fi

          pooled_resp=$(curl -sS "${CURL_OPTS[@]}" -X GET "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/connection_uri?branch_id=${branch_id}&database_name=${db_name}&role_name=${role_name}&pooled=true" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Accept: application/json")
          direct_resp=$(curl -sS "${CURL_OPTS[@]}" -X GET "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/connection_uri?branch_id=${branch_id}&database_name=${db_name}&role_name=${role_name}" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Accept: application/json")

          pooled=$(echo "$pooled_resp" | jq -r '.uri // .connection_uri // .connection_string // empty' 2>/dev/null || true)
          direct=$(echo "$direct_resp" | jq -r '.uri // .connection_uri // .connection_string // empty' 2>/dev/null || true)
          if [ -z "$pooled" ]; then
            pooled=$(printf '%s' "$pooled_resp" | tr -d '"')
          fi
          if [ -z "$direct" ]; then
            direct=$(printf '%s' "$direct_resp" | tr -d '"')
          fi
          if [ -z "$pooled" ] || [ -z "$direct" ]; then
            echo "Failed to get connection URIs for branch_id=$branch_id database_name=$db_name role_name=$role_name"
            exit 1
          fi
          echo "::add-mask::$pooled"
          echo "::add-mask::$direct"
          echo "pooled=$pooled" >> $GITHUB_OUTPUT
          echo "direct=$direct" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "branch_id=$branch_id" >> $GITHUB_OUTPUT

      - name: Inject DATABASE_URL into Render preview (private)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          pooled="${{ steps.neon.outputs.pooled }}"
          echo "Setting private DATABASE_URL on Render service"
          curl -sS --fail-with-body -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg name 'DATABASE_URL' --arg value "$pooled" '{name:$name, value:$value, private:true}')"

      - name: Run migrations on PR DB (Direct)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.11

      - name: Install system deps and gems
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev libssl-dev
          cd backend
          bundle install --jobs 4 --retry 3

      - name: Run db:migrate
        working-directory: backend
        env:
          DATABASE_URL: ${{ steps.neon.outputs.direct }}
        run: |
          echo "Running migrations against PR DB"
          bundle exec rails db:migrate

      - name: Comment on PR with preview info
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const branch = "${{ steps.neon.outputs.branch }}";
            const body = `Preview DB created: ${branch}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
