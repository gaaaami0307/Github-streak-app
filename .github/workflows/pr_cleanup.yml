name: Cleanup PR preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  cleanup:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID || secrets.NEON_SERVICE_ID }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

    steps:
      - name: Prepare tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Delete Neon branches for PR
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          set -euo pipefail
          PR_NUM=${{ github.event.pull_request.number }}
          echo "Looking up branches for PR $PR_NUM"
          resp=$(curl -sS --fail-with-body -H "Authorization: Bearer $NEON_API_KEY" "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches")
          echo "$resp" | jq -c --arg pr "pr-$PR_NUM" '.branches // [] | .[] | select(.name | startswith($pr))' | while read -r b; do
            branch_id=$(echo "$b" | jq -r '.id')
            name=$(echo "$b" | jq -r '.name')
            echo "Deleting Neon branch: $name ($branch_id)"
            curl -sS --fail-with-body -X DELETE "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/$branch_id" \
              -H "Authorization: Bearer $NEON_API_KEY"
          done || true

      - name: Remove Render preview env vars (DATABASE_URL)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' --request DELETE "https://api.render.com/v1/services/$RENDER_SERVICE_ID/env-vars/DATABASE_URL" \
            -H "Authorization: Bearer $RENDER_API_KEY")
          case "$http_code" in
            200|204)
              echo "Deleted DATABASE_URL from Render service $RENDER_SERVICE_ID"
              ;;
            404)
              echo "DATABASE_URL was already absent on Render service $RENDER_SERVICE_ID"
              ;;
            *)
              echo "Failed to delete DATABASE_URL from Render service $RENDER_SERVICE_ID (HTTP $http_code)"
              cat "$response_file"
              exit 1
              ;;
          esac
          rm -f "$response_file"

      - name: Comment on PR cleanup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `Preview resources for PR #${pr.number} cleaned up.`,
            });
